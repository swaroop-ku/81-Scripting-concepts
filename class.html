<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class in js</title>
</head>
<body>
    <script>
        class student{
            constructor(id,name,roll){
                this.id = id;
                this.name = name;
                this.roll = roll;
            }

            display(){
                console.log("Id of student:"+this.id);
                console.log("Name of student:"+this.name);
                console.log("Roll number:"+this.roll);
            }
        }

        id = prompt("Enter the id");
        name = prompt("Enter the name");
        roll= parseInt(prompt("Enter the roll number"));
        let s1 = new student(id,name,roll);
        s1.display();
    </script>
</body>
</html>
