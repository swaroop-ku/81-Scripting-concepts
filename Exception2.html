<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exception Handling in Js</title>
</head>
<body>
    <script>
        try{
            let a = parseInt(prompt("Enter the age"))
            if(a < 18) throw new Error("Your age is less than 18");
            alert("Age:"+a);
        }
        catch(error){
            alert(""+error.message)
        }
    </script>
</body>
</html>
