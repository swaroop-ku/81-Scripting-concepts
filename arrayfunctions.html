<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>functions of array</title>
</head>
<body>
    <script>
        let a = [3,4,5,6]
        console.log("Original Array:"+a);
        a.push(7);
        console.log("Array after push:"+a);
        a.pop();
        console.log("Array after pop:"+a);
        a.unshift(100);
        console.log("Array after unshift:"+a);
        a.shift(200);
        console.log("Array after shift:"+a);
        console.log("Current length of array:",+(a.length));
        console.log("index of 3 is:"+a.indexOf(3));

        let b = [20,40]
        console.log("Array after concatenation:"+a.concat(b));

        console.log("Joining the array:"+a.join("-"));

        document.write("<h3>forEach<h3><br>");
        a.forEach(function(value){
            document.write(value+"<br>");
        })
    </script>
</body>
</html>
